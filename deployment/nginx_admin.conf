# North Paradise - Admin Panel Nginx Config
# Location: /etc/nginx/sites-available/admin

server {
    listen 80;
    server_name admin.northparadisetreksandtours.com; # Replace with your subdomain

    root /var/www/northparadise/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve Backend Uploads (Images)
    location /uploads {
        alias /var/www/northparadise/backend/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
