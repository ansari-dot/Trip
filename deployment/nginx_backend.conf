# North Paradise - Backend API Nginx Config
# Location: /etc/nginx/sites-available/backend

server {
    listen 80;
    server_name api.northparadise.com; # Replace with your subdomain

    # Max upload size for images
    client_max_body_size 20M;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Direct access to uploads via API subdomain
    location /uploads {
        alias /var/www/northparadise/backend/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # Enable CORS for images
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
    }
}
